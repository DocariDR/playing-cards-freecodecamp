<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main id="playing-cards">
        <div class="card" aria-label="Spade card">
            <div class="left" aria-hidden="true">♠</div>
            <div class="middle" aria-hidden="true">♠</div>
            <div class="right" aria-hidden="true">♠</div>
        </div>
        <div class="card" aria-label="Club card">
            <div class="left" aria-hidden="true">♣</div>
            <div class="middle" aria-hidden="true">♣</div>
            <div class="right" aria-hidden="true">♣</div>
        </div>
        <div class="card red" aria-label="Heart card">
            <div class="left" aria-hidden="true">♥</div>
            <div class="middle" aria-hidden="true">♥</div>
            <div class="right" aria-hidden="true">♥</div>
        </div>
        <div class="card red" aria-label="Diamond card">
            <div class="left" aria-hidden="true">♦</div>
            <div class="middle" aria-hidden="true">♦</div>
            <div class="right" aria-hidden="true">♦</div>
        </div>
    </main>
</body>

</html>
